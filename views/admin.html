<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CTF Mission Control</title>
    <style>
        :root { --bg: #1a102a; --panel: #2a1b40; --accent: #e066a3; --text: #ffb74d; }
        body { background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; text-align: center; padding: 30px; margin: 0; }
        .container { max-width: 800px; margin: 0 auto; display: flex; flex-direction: column; gap: 30px; }
        
        .card { 
            background: var(--panel); padding: 30px; border-radius: 20px; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.5); border: 1px solid rgba(224, 102, 163, 0.3); 
        }
        
        h1, h2 { margin: 0 0 15px 0; text-shadow: 0 0 10px var(--accent); }
        hr { border: none; height: 2px; background: linear-gradient(90deg, transparent, var(--accent), transparent); margin: 20px 0; }
        
        /* Rounded, glowing buttons */
        button { 
            background: var(--accent); color: white; border: none; padding: 15px 30px; 
            font-size: 18px; cursor: pointer; border-radius: 30px; 
            box-shadow: 0 0 15px var(--accent); transition: transform 0.2s, box-shadow 0.2s;
            font-weight: bold; font-family: monospace; text-transform: uppercase;
        }
        button:hover { transform: translateY(-3px); box-shadow: 0 0 25px var(--accent); }
        .danger-btn { background: #d32f2f; box-shadow: 0 0 15px #d32f2f; }
        .danger-btn:hover { box-shadow: 0 0 25px #d32f2f; }
        
        /* Inline text formatting */
        .inline-text { font-size: 1.2em; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .inline-input { 
            padding: 5px; width: 60px; font-size: 1.2em; text-align: center; 
            border-radius: 10px; border: 2px solid var(--accent); 
            background: var(--bg); color: white; font-family: monospace;
        }

        /* Task Upload Form */
        .form-group { display: flex; flex-direction: column; gap: 10px; text-align: left; margin-bottom: 20px; }
        .form-group label { color: var(--accent); font-weight: bold; font-size: 1.1em; }
        .form-group input, .form-group textarea {
            padding: 15px; border-radius: 10px; border: 1px solid rgba(224, 102, 163, 0.5);
            background: var(--bg); color: white; font-family: monospace; font-size: 1em;
        }
        .form-group input[type="file"] { padding: 10px; background: transparent; border: 2px dashed var(--accent); cursor: pointer; }
    </style>
</head>
<body>

    <div class="container">
        <h1>MISSION CONTROL</h1>
        <div class="card">
            <h2>GAME CLOCK</h2>
            <hr>
            <button id="start-btn" onclick="startTimer()"> Start 2-Hour Timer</button>
            <p id="timer-status" style="margin-top: 15px; font-weight: bold; color: var(--accent);"></p>
        </div>

        <div class="card">
            <h2>TASK UNLOCKER</h2>
            <hr>
            <div class="inline-text">
                Unlock up to: <input type="number" id="taskCount" class="inline-input" value="1" min="1"> tasks
            </div>
            <button onclick="unlock()"> Update Active Tasks</button>
        </div>

    <div class="card">
            
        <h2>UPLOAD NEW TASK</h2>
        <hr>
        <form id="uploadForm" onsubmit="submitTask(event)">
            <input type="hidden" name="adminKey" value="jillian">
            
                    <div class="form-group">
                        <label>Task Name</label>
                        <input type="text" name="taskName" placeholder="e.g., SQL Injection 101" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Description</label>
                        <textarea name="taskDesc" rows="3" placeholder="Explain the challenge..." required></textarea>
                    </div>
                    
                    <div class="form-group">
                        <label>Estimated Time Required</label>
                        <input type="text" name="taskTime" placeholder="e.g., 15 minutes" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Task Image</label>
                        <input type="file" name="taskImage" accept="image/*" required>
                    </div>
                    
                    <button type="submit" id="upload-btn">➕ Save Task to Server</button>
                    <p id="upload-status" style="margin-top: 15px; font-weight: bold; color: var(--accent);"></p>
                </form>
            </div>

        <div class="card" style="border-color: #d32f2f;">
            <h2 style="color: #d32f2f; text-shadow: none;">DANGER ZONE</h2>
            <hr style="background: linear-gradient(90deg, transparent, #d32f2f, transparent);">
            <p style="margin-bottom: 20px;">Manage or delete existing tasks from the server.</p>
            <button class="danger-btn" onclick="location.href='/supersecretcyber-panel/manage-tasks?admin=jillian'">🗑️ Open Task Manager</button>
        </div>
    </div>

    <script>
        function unlock() {
            const count = document.getElementById('taskCount').value;
            location.href = `/supersecretcyber-panel/set-tasks?admin=jillian&count=${count}`;
        }
    </script>


    <script>
    // --- SILENT TASK UPLOAD ---
    async function submitTask(event) {
    // 1. Stop the browser from redirecting!
    event.preventDefault(); 
    
    const form = document.getElementById('uploadForm');
    const btn = document.getElementById('upload-btn');
    const statusText = document.getElementById('upload-status');
    
    // 2. Package all the text and the image file together
    const formData = new FormData(form);
    
    // Visual feedback
    btn.innerText = "Uploading...";
    btn.disabled = true;
    statusText.innerText = "";

    try {
        // 3. Send the package to the Raspberry Pi
        const response = await fetch('/supersecretcyber-panel/upload-task', {
            method: 'POST',
            body: formData
        });

        if (response.ok) {
            btn.innerText = "✔ UPLOAD COMPLETE";
            btn.style.backgroundColor = "#4caf50";
            btn.style.boxShadow = "0 0 15px #4caf50";
            statusText.innerText = "Task successfully added to the database!";
            form.reset(); // Clear the inputs for the next task
            
            // Reset button color after 3 seconds
            setTimeout(() => {
                btn.innerText = "➕ Save Task to Server";
                btn.style.backgroundColor = "var(--accent)";
                btn.style.boxShadow = "0 0 15px var(--accent)";
                btn.disabled = false;
            }, 3000);
        } else {
            statusText.innerText = "Error: Could not save task.";
            btn.innerText = "Try Again";
            btn.disabled = false;
        }
    } catch (error) {
        statusText.innerText = "Critical Error: Lost connection.";
        btn.disabled = false;
    }
}

    </script>
    <script>
    // --- TIMER CONTROL ---
    async function startTimer() {
        const btn = document.getElementById('start-btn');
        const statusText = document.getElementById('timer-status');
    
        btn.innerText = "Initiating...";
        btn.disabled = true; 

        try {
            const response = await fetch('/supersecretcyber-panel/start-timer?admin=jillian');
            
            if (response.ok) {
                btn.innerText = "✔ TIMER RUNNING";
                btn.style.backgroundColor = "#4caf50"; 
                btn.style.boxShadow = "0 0 15px #4caf50";
                statusText.innerText = "Server clock engaged! All player dashboards are now ticking.";
            } else {
                statusText.innerText = "Error: Access Denied or Server Error.";
                btn.innerText = "Try Again";
                btn.disabled = false;
            }
        } catch (error) {
            statusText.innerText = "Critical Error: Lost connection to Raspberry Pi.";
            btn.disabled = false;
        }
    }

    function unlock() {
        const count = document.getElementById('taskCount').value;
        location.href = `/supersecretcyber-panel/set-tasks?admin=jillian&count=${count}`;
    }
</script>
</body>
</html>
