<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CTF Mission Control</title>
    <style>
        :root { --bg: #1a102a; --panel: #2a1b40; --accent: #e066a3; --text: #ffb74d; }
        body { background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; text-align: center; padding: 30px; margin: 0; }
        .container { max-width: 800px; margin: 0 auto; display: flex; flex-direction: column; gap: 30px; }
        
        .card { 
            background: var(--panel); padding: 30px; border-radius: 20px; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.5); border: 1px solid rgba(224, 102, 163, 0.3); 
        }
        
        h1, h2 { margin: 0 0 15px 0; text-shadow: 0 0 10px var(--accent); }
        hr { border: none; height: 2px; background: linear-gradient(90deg, transparent, var(--accent), transparent); margin: 20px 0; }
        
        /* Rounded, glowing buttons */
        button { 
            background: var(--accent); color: white; border: none; padding: 15px 30px; 
            font-size: 18px; cursor: pointer; border-radius: 30px; 
            box-shadow: 0 0 15px var(--accent); transition: transform 0.2s, box-shadow 0.2s;
            font-weight: bold; font-family: monospace; text-transform: uppercase;
        }
        button:hover { transform: translateY(-3px); box-shadow: 0 0 25px var(--accent); }
        .danger-btn { background: #d32f2f; box-shadow: 0 0 15px #d32f2f; }
        .danger-btn:hover { box-shadow: 0 0 25px #d32f2f; }
        
        /* Inline text formatting */
        .inline-text { font-size: 1.2em; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .inline-input { 
            padding: 5px; width: 60px; font-size: 1.2em; text-align: center; 
            border-radius: 10px; border: 2px solid var(--accent); 
            background: var(--bg); color: white; font-family: monospace;
        }

        /* Task Upload Form */
        .form-group { display: flex; flex-direction: column; gap: 10px; text-align: left; margin-bottom: 20px; }
        .form-group label { color: var(--accent); font-weight: bold; font-size: 1.1em; }
        .form-group input, .form-group textarea {
            padding: 15px; border-radius: 10px; border: 1px solid rgba(224, 102, 163, 0.5);
            background: var(--bg); color: white; font-family: monospace; font-size: 1em;
        }
        .form-group input[type="file"] { padding: 10px; background: transparent; border: 2px dashed var(--accent); cursor: pointer; }
    </style>
</head>
<body>

    <div class="container">
        <h1>🛰️ MISSION CONTROL</h1>

        <div class="card">
            <h2>GAME CLOCK</h2>
            <hr>
            <button onclick="location.href='/admin/start-timer?admin=jillian'">&#128640; Start 2-Hour Timer</button>
        </div>

        <div class="card">
            <h2>TASK LOCKER</h2>
            <hr>
            <div class="inline-text">
                Unlock up to: <input type="number" id="taskCount" class="inline-input" value="1" min="1"> tasks
            </div>
            <button onclick="unlock()"> Update Active Tasks</button>
        </div>

        <div class="card">
            <h2>UPLOAD NEW TASK</h2>
            <hr>
            <form action="/admin/upload-task" method="POST" enctype="multipart/form-data">
                <input type="hidden" name="adminKey" value="jillian">
                
                <div class="form-group">
                    <label>Task Name</label>
                    <input type="text" name="taskName" placeholder="e.g., SQL Injection 101" required>
                </div>
                
                <div class="form-group">
                    <label>Description</label>
                    <textarea name="taskDesc" rows="3" placeholder="Explain the challenge..." required></textarea>
                </div>
                
                <div class="form-group">
                    <label>Estimated Time Required</label>
                    <input type="text" name="taskTime" placeholder="e.g., 15 minutes" required>
                </div>
                
                <div class="form-group">
                    <label>Task Image</label>
                    <input type="file" name="taskImage" accept="image/*" required>
                </div>
                
                <button type="submit">➕ Save Task to Database</button>
            </form>
        </div>

        <div class="card" style="border-color: #d32f2f;">
            <h2 style="color: #d32f2f; text-shadow: none;">DANGER ZONE</h2>
            <hr style="background: linear-gradient(90deg, transparent, #d32f2f, transparent);">
            <p style="margin-bottom: 20px;">Manage or delete existing tasks from the server.</p>
            <button class="danger-btn" onclick="location.href='/admin/manage-tasks?admin=jillian'">🗑️ Open Task Manager</button>
        </div>
    </div>

    <script>
        function unlock() {
            const count = document.getElementById('taskCount').value;
            location.href = `/admin/set-tasks?admin=jillian&count=${count}`;
        }
    </script>
</body>
</html>
